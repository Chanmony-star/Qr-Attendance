<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}QR Attendance System{% endblock %}</title>
  <style>
    :root {
      --primary: #2563eb; --primary-dark: #1d4ed8;
      --success: #16a34a; --danger: #dc2626; --warning: #d97706;
      --bg: #f1f5f9; --surface: #ffffff; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b;
      --radius: 10px; --shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: .75rem 1.5rem;
           display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { font-weight: 700; font-size: 1.1rem; color: var(--primary); }
    .nav-links { display: flex; gap: 1rem; align-items: center; font-size: .9rem; }

    /* Container */
    .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 1.5rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }

    /* Forms */
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .35rem; color: var(--muted); }
    .form-control { width: 100%; padding: .6rem .75rem; border: 1px solid var(--border);
                    border-radius: 6px; font-size: .95rem; transition: border .2s; }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
    small.help { font-size: .78rem; color: var(--muted); margin-top: .25rem; display: block; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .6rem 1.2rem;
           border: none; border-radius: 6px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn:hover { opacity: .88; }
    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-success  { background: var(--success); color: #fff; }
    .btn-danger   { background: var(--danger);  color: #fff; }
    .btn-outline  { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-sm       { padding: .35rem .8rem; font-size: .82rem; }

    /* Badges */
    .badge { display: inline-block; padding: .25rem .6rem; border-radius: 999px; font-size: .75rem; font-weight: 700; }
    .badge-open   { background: #dcfce7; color: #166534; }
    .badge-closed { background: #fee2e2; color: #991b1b; }
    .badge-wifi   { background: #dbeafe; color: #1e40af; }
    .badge-gps    { background: #fef3c7; color: #92400e; }

    /* Alerts */
    .alert { padding: .75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: .9rem; }
    .alert-error   { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
    .alert-success { background: #dcfce7; border: 1px solid #86efac; color: #166534; }
    .alert-warning { background: #fef9c3; border: 1px solid #fde68a; color: #92400e; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th, td { padding: .6rem .75rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { font-weight: 600; color: var(--muted); background: var(--bg); }
    tr:hover td { background: #f8fafc; }

    /* Stat cards */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
                 padding: 1rem; text-align: center; }
    .stat-card .num  { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
    .stat-card .lbl  { font-size: .8rem; color: var(--muted); margin-top: .25rem; }

    /* Check icons */
    .check-yes { color: var(--success); }
    .check-no  { color: var(--danger); }

    /* QR display */
    .qr-wrap { text-align: center; padding: 1rem; }
    .qr-wrap img { max-width: 220px; border: 4px solid var(--border); border-radius: 8px; }
  </style>
</head>
<body>
  {% if user.is_authenticated %}
  <nav class="nav">
    <span class="nav-brand">📋 QR Attendance</span>
    <div class="nav-links">
      <a href="{% url 'dashboard' %}">Dashboard</a>
      <a href="{% url 'create_session' %}">+ New Session</a>
      <span style="color:var(--muted);">|</span>
      <span style="color:var(--muted);">{{ user.get_full_name|default:user.username }}</span>
      <a href="{% url 'admin_logout' %}" style="color:var(--danger);">Logout</a>
    </div>
  </nav>
  {% endif %}
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
